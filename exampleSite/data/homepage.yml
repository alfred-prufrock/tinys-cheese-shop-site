################ About #######################
about:
  enable: true
  label: "OUR STORY"
  image: "images/cheese-aged-blocks.jpg"
  title: "Where Cheese Meets <span class='text-accent'>Community</span>"
  description_paragraphs:
    - "Tiny's opened in September 2025 in the heart of Edmonton's Oliver neighbourhood with a simple mission: bring exceptional cheese to our community. We specialize in Canadian and European artisan cheeses, carefully selected for quality, flavour, and story."
    - "Our shop may be small, but our selection is thoughtfully curated. Every cheese on our shelves has been tasted, vetted, and chosen because it represents something special—whether that's a traditional Alpine cheesemaking technique, a Canadian creamery pushing boundaries, or simply a crowd-pleaser that never gets old."
    - "We believe cheese should be approachable, not intimidating. Come browse, ask questions, taste samples, and discover your new favourites. We're here to help you find the perfect cheese for your dinner party, gift basket, or Tuesday night snack."
  button_label: "Visit Us"
  button_link: "#contact"

################# Featured Cheeses ################
featured_cheeses:
  enable: true
  label: "WHAT WE OFFER"
  title: "Canadian & European <span class='text-accent'>Artisan Cheeses</span>"
  description: "From aged cheddars to creamy bries, washed rinds to Alpine styles—we carry cheeses that tell a story."
  categories:
    - title: "Canadian Artisan"
      image: "images/canadian-cheese.jpg"
      description: "Celebrating Canada's incredible cheesemaking renaissance. From Quebec's traditional varieties to B.C.'s innovative creameries, we showcase the best of Canadian cheese."
      
    - title: "European Classics"
      image: "images/european-cheese.jpg"
      description: "Time-honoured cheeses from France, Italy, Switzerland, and beyond. Authentic imports that honour centuries of cheesemaking tradition."
      
    - title: "Pairings & Accompaniments"
      image: "images/bread-wine-pairings.jpg"
      description: "Artisan bread, craft wines, preserves, and charcuterie to complete your cheese experience. Everything you need for the perfect board."

